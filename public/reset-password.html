<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set a new password · Argument Registry</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
</head>
<body>
  <header class="masthead">
    <div class="masthead__inner">
      <a class="brand" href="/index.html">
        <img src="favicon.jpg" alt="Society Logo" class="header-logo">
        <span class="brand__mark">⬦&nbsp;Argument Registry</span>
        <span id="society-name" class="brand__sub">RSociety Name</span>
      </a>
      <nav id="main-nav"></nav>
    </div>
  </header>

  <div class="auth-wrap">
    <main class="auth-card">
      <p class="eyebrow">Security</p>
      <h1>Set a new password</h1>
      <hr class="rule-brass" />

      <p class="muted text-sm">
        Welcome, <strong id="reset-user">member</strong>. Before continuing you must
        replace the temporary password you were issued. Choose at least 12 characters.
      </p>

      <div class="alert alert--error hidden" id="reset-error" role="alert"></div>

      <form id="reset-form" autocomplete="off">
        <div class="field">
          <label for="current_password">Temporary (current) password</label>
          <input class="input" type="password" id="current_password" name="current_password"
                 autocomplete="current-password" required />
          <div class="field-error"></div>
        </div>
        <div class="field">
          <label for="new_password">New password</label>
          <input class="input" type="password" id="new_password" name="new_password"
                 autocomplete="new-password" minlength="12" required />
          <div class="hint">Minimum 12 characters.</div>
          <div class="field-error"></div>
        </div>
        <div class="field">
          <label for="confirm_password">Confirm new password</label>
          <input class="input" type="password" id="confirm_password" name="confirm_password"
                 autocomplete="new-password" required />
          <div class="field-error"></div>
        </div>
        <button class="btn btn--block" type="button" id="reset-btn">Set new password</button>
      </form>
    </main>
  </div>

  <script type="module" src="/js/reset-password.js"></script>
</body>
</html>
